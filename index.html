<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voetbal 2026</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #0f172a;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: white;
      padding: 24px;
      box-sizing: border-box;
    }

    .hero {
      background: linear-gradient(135deg, #061a33, #16a34a);
      color: white;
      border-radius: 28px;
      padding: 28px;
      margin-bottom: 24px;
    }

    .hero h1 {
      font-size: 42px;
      margin: 0 0 8px;
    }

    .card {
      background: #f8fafc;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .match {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .time {
      color: #16a34a;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>Voetbal 2026</h1>
      <p>Het toernooi. Alles in één app.</p>
    </section>

    <h2>Vandaag</h2>

    <section class="card match">
      <div>
        <strong>Nederland vs België</strong><br />
        <small>Groep A</small>
      </div>
      <div class="time">20:00</div>
    </section>

    <section class="card match">
      <div>
        <strong>Brazilië vs Zwitserland</strong><br />
        <small>Groep B</small>
      </div>
      <div class="time">17:00</div>
    </section>

    <h2>Stats</h2>

    <section class="card">
      <strong>Wedstrijden vandaag:</strong> 6<br />
      <strong>Doelpunten:</strong> 18<br />
      <strong>Topteam:</strong> Nederland
    </section>
  </main>
</body>
</html>
