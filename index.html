<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup 2026 Dashboard</title>
  <style>
    :root {
      --bg-color: #f8fafc;
      --navy: #0f172a;
      --blue: #2563eb;
      --text-main: #1e293b;
      --text-light: #64748b;
      --border: #e2e8f0;
      --card-bg: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      padding-bottom: 40px;
    }

    /* --- Header & Dashboard --- */
    header {
      background: var(--navy);
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    /* --- Filters --- */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 5px;
    }

    .filter-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 700;
      color: var(--text-light);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: var(--navy);
      color: white;
      border-color: var(--navy);
    }

    /* --- Date Grouping --- */
    .date-group {
      margin-bottom: 30px;
    }

    .date-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0 16px;
      font-size: 18px;
      font-weight: 900;
      color: var(--navy);
    }

    /* --- Fixture Cards (FIFA/Sporza Style) --- */
    .match-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .fixture-card {
      background: var(--card-bg);
      border-radius: 8px;
      padding: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
    }

    .fixture-top {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
    }

    .fixture-team {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 900;
    }

    .fixture-team.away {
      justify-content: flex-end;
    }

    .flag-box {
      width: 40px;
      height: 28px;
      border-radius: 4px;
      background: #f1f5f9;
      display: grid;
      place-items: center;
      font-size: 22px;
      box-shadow: inset 0 0 0 1px var(--border);
    }

    .fixture-time {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -1px;
      color: var(--navy);
    }

    .fixture-score {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -1px;
      color: var(--navy);
    }

    .fixture-meta {
      text-align: center;
      margin-top: 16px;
      color: var(--text-light);
      font-size: 14px;
      font-weight: 600;
    }

    .fixture-meta strong {
      display: block;
      color: var(--navy);
      font-size: 15px;
      margin-bottom: 4px;
    }

    /* --- Broadcasters (Fix: Clickable) --- */
    .fixture-broadcast {
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .broadcaster {
      background: #f8fafc;
      border: 1px solid var(--border);
      padding: 4px 8px;
      border-radius: 6px;
      color: var(--navy);
      font-size: 12px;
      font-weight: 800;
      text-decoration: none; /* Removes standard link styling */
      transition: background 0.2s;
    }

    .broadcaster:hover {
      background: #e2e8f0;
    }

    .broadcaster.sporza {
      background: #111827;
      color: white;
    }

    .broadcaster.sporza:hover {
      background: #374151;
    }

    /* --- Top Scorers (Demo Data) --- */
    .section-title {
      font-size: 20px;
      font-weight: 900;
      margin: 40px 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .demo-badge {
      background: #fef08a;
      color: #854d0e;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 12px;
      text-transform: uppercase;
      font-weight: 800;
    }

    .stats-card {
      background: var(--card-bg);
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 16px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }

    .stat-row:last-child {
      border-bottom: none;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
      font-weight: 600;
      background: white;
      border-radius: 8px;
      border: 1px dashed var(--border);
    }

    /* --- Loading State --- */
    #loading {
      text-align: center;
      padding: 40px;
      font-weight: bold;
      color: var(--blue);
    }
  </style>
</head>
<body>

  <header>
    <h1>World Cup 2026</h1>
  </header>

  <div class="container">
    
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">Alle Matchen</button>
      <button class="filter-btn" data-filter="upcoming">Aankomend</button>
      <button class="filter-btn" data-filter="finished">Gespeeld</button>
    </div>

    <div id="loading">Data laden (max 5 sec)...</div>
    <div id="scheduleList"></div>

    <h2 class="section-title">
      Topscorers <span class="demo-badge">Demo Data</span>
    </h2>
    <div class="stats-card">
      <div class="stat-row">
        <span>1. Kylian Mbappé (FRA)</span>
        <span>5 ⚽</span>
      </div>
      <div class="stat-row">
        <span>2. Harry Kane (ENG)</span>
        <span>4 ⚽</span>
      </div>
      <div class="stat-row">
        <span>3. Romelu Lukaku (BEL)</span>
        <span>3 ⚽</span>
      </div>
    </div>

  </div>

  <script>
    // Config
    const API_URL = "https://example.com/api/worldcup"; // Vervang later door echte API
    let allMatches = [];
    let activeFilter = "all";

    // Demo Data Fallback
    const DEMO_MATCHES = [
      { id: 1, date: "2026-06-11", time: "15:00", team1: "Mexico", team2: "Poland", group: "Group A", stadium: "Azteca" },
      { id: 2, date: "2026-06-11", time: "18:00", team1: "Belgium", team2: "Canada", group: "Group F", stadium: "BMO Field", score: { home: 2, away: 0 }, status: "finished" },
      { id: 3, date: "2026-06-12", time: "21:00", team1: "England", team2: "USA", group: "Group B", stadium: "MetLife" },
      { id: 4, date: "2026-06-12", time: "15:00", team1: "Scotland", team2: "Germany", group: "Group C", stadium: "BC Place" }
    ];

    // Helper: Veilige HTML output
    function escapeHtml(str) {
      if (!str) return "";
      return String(str).replace(/[&<>'"]/g, tag => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[tag]));
    }

    // Helper: Landcodes
    function getTeamCode(teamName) {
      const codes = { "mexico": "MEX", "poland": "POL", "belgium": "BEL", "canada": "CAN", "england": "ENG", "usa": "USA", "scotland": "SCO", "germany": "GER" };
      const name = String(teamName || "").toLowerCase();
      return codes[name] || String(teamName || "TBD").slice(0, 3).toUpperCase();
    }

    // Helper: Vlaggen (Gefixt!)
    function getTeamFlag(teamName) {
      const flags = {
        "mexico": "🇲🇽", "poland": "🇵🇱", "belgium": "🇧🇪", "canada": "🇨🇦",
        "england": "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "scotland": "🏴󠁧󠁢󠁳󠁣󠁴󠁿", "usa": "🇺🇸", "germany": "🇩🇪"
      };
      const name = String(teamName || "").toLowerCase();
      return flags[name] || "🏳️";
    }

    // Datum formatter
    function formatFullEnglishDate(dateString) {
      if (!dateString) return "";
      const date = new Date(dateString + "T12:00:00");
      return date.toLocaleDateString("nl-BE", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
    }

    // Opgeschoonde match card generator met klikbare broadcasters
    function fixtureCard(m) {
      const hasScore = Boolean(m.score);
      const centerValue = hasScore
        ? `<div class="fixture-score">${m.score.home} - ${m.score.away}</div>`
        : `<div class="fixture-time">${escapeHtml(m.time || "TBD")}</div>`;

      const meta = [m.group, m.stadium].filter(Boolean).join(" · ");

      return `
        <div class="fixture-card">
          <div class="fixture-top">
            <div class="fixture-team home">
              <span>${escapeHtml(getTeamCode(m.team1))}</span>
              <span class="flag-box">${getTeamFlag(m.team1)}</span>
            </div>
            ${centerValue}
            <div class="fixture-team away">
              <span class="flag-box">${getTeamFlag(m.team2)}</span>
              <span>${escapeHtml(getTeamCode(m.team2))}</span>
            </div>
          </div>
          <div class="fixture-meta">
            <strong>${escapeHtml(m.round || "First Stage")}</strong>
            ${escapeHtml(meta)}
          </div>
          <div class="fixture-broadcast">
            <span>▻</span>
            <a href="https://sporza.be" target="_blank" rel="noopener" class="broadcaster sporza">sporza</a>
            <a href="https://vrtmax.be" target="_blank" rel="noopener" class="broadcaster">VRT MAX</a>
            <a href="https://rtbf.be/sport" target="_blank" rel="noopener" class="broadcaster">rtbf</a>
          </div>
        </div>
      `;
    }

    // Render matches gegroepeerd per datum
    function renderSchedule() {
      const target = document.getElementById("scheduleList");
      let filtered = [...allMatches];

      if (activeFilter === "upcoming") filtered = filtered.filter(m => m.status !== "finished");
      if (activeFilter === "finished") filtered = filtered.filter(m => m.status === "finished");

      if (!filtered.length) {
        target.innerHTML = `<div class="empty-state">Geen wedstrijden gevonden.</div>`;
        return;
      }

      const grouped = {};
      filtered.forEach(match => {
        if (!grouped[match.date]) grouped[match.date] = [];
        grouped[match.date].push(match);
      });

      target.innerHTML = Object.keys(grouped).sort().map(date => `
        <div class="date-group">
          <div class="date-title">
            <span>${escapeHtml(formatFullEnglishDate(date))}</span>
          </div>
          <div class="match-list">
            ${grouped[date].map(fixtureCard).join("")}
          </div>
        </div>
      `).join("");
    }

    // Veilige Fetch met 5 sec Timeout
    async function fetchMatches() {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 5000); // 5 sec timeout

      try {
        const response = await fetch(API_URL, { signal: controller.signal });
        clearTimeout(timeoutId);
        
        if (!response.ok) throw new Error("API niet bereikbaar");
        
        const data = await response.json();
        allMatches = data;
      } catch (error) {
        clearTimeout(timeoutId);
        console.warn("API mislukt of time-out, laden van demo-data:", error);
        allMatches = DEMO_MATCHES; // Fallback bij error of timeout
      }

      document.getElementById("loading").style.display = "none";
      renderSchedule();
    }

    // Filter Knoppen Logica
    document.getElementById("filters").addEventListener("click", (e) => {
      if (e.target.classList.contains("filter-btn")) {
        document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
        e.target.classList.add("active");
        activeFilter = e.target.dataset.filter;
        renderSchedule();
      }
    });

    // Start App
    fetchMatches();
  </script>
</body>
</html>
